# Build debug APKs for testing without a release tag.
# Triggered on push to main and manually via workflow_dispatch.
# APKs are unsigned (debug keystore) — installable via adb install -t
# or by sideloading from a device with developer options enabled.
name: Build Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build/
          key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
